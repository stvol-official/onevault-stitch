<option>All Risks</option>

<span class="material-symbols-outlined text-base">refresh</span>
Reset
</button>

</div>

<div class="border border-border-light bg-white rounded-lg">

<div class="col-span-1 font-display">Asset</div>
<div class="col-span-4 font-display">Vault Identity</div>

<div class="col-span-2 text-right font-display">TVL</div>

</div>
<div id="vault-list" class="divide-y divide-border-light"></div>
</div>

<div class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-4">

<div class="text-[11px] text-[#666666] tracking-widests uppercase font-display">
    © 2024 OneVault Institutional. All rights reserved.
</div>

<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>

</div>

<script src="vaults-data.js"></script>
<script>
// ─── Data ──────────────────────────────────────────────────────────────────
// VAULTS is loaded from vaults-data.js

const FEATURED = [
  {
    label: "Institutional Pick",
    name: "Arc Low Risk",
    desc: "Stable yield from institutional lending.",
    apy: "3.5%",
    icon: "shield",
    link: "vault_detail.html",
  },
  {
    label: "Institutional Pick",
    name: "Arc Medium Risk",
    desc: "Optimized yield from curated DeFi protocols.",
    apy: "5.5%",
    icon: "account_balance_wallet",
    link: "vault_detail.html",
  },
  {
    label: "Institutional Pick",
    name: "Arc High Risk",
    desc: "High-performance yield from structured options.",
    apy: "7.5%",
    icon: "trending_up",
    link: "vault_detail.html",
  },
];

// VAULTS loaded from vaults-data.js

// ─── State ─────────────────────────────────────────────────────────────────

const PAGE_SIZE = 8;
let currentPage = 1;

// ─── Helpers ───────────────────────────────────────────────────────────────

function getFilters() {
  return {
    asset: document.getElementById("filter-asset").value,
    apy:   document.getElementById("filter-apy").value,
    tvl:   document.getElementById("filter-tvl").value,
    risk:  document.getElementById("filter-risk").value,
  };
}

function applyFilters(vaults, f) {
  return vaults.filter(v => {
    if (f.asset !== "All Assets" && v.asset !== f.asset) return false;

    if (f.apy === "0% - 5%"   && !(v.apy >= 0  && v.apy < 5))  return false;
    if (f.apy === "5% - 10%"  && !(v.apy >= 5  && v.apy < 10)) return false;
    if (f.apy === "10% - 20%" && !(v.apy >= 10 && v.apy < 20)) return false;
    if (f.apy === "20%+"      && v.apy < 20) return false;

    if (f.tvl === "> $1B"        && v.tvlRaw <= 1_000_000_000) return false;
    if (f.tvl === "$500M - $1B"  && !(v.tvlRaw >= 500_000_000 && v.tvlRaw <= 1_000_000_000)) return false;
    if (f.tvl === "$100M - $500M" && !(v.tvlRaw >= 100_000_000 && v.tvlRaw < 500_000_000)) return false;

    if (f.risk === "Low (A/A+)"   && v.riskTier !== "low")    return false;
    if (f.risk === "Medium (B/B+)" && v.riskTier !== "medium") return false;
    if (f.risk === "High (C+)"    && v.riskTier !== "high")   return false;

    return true;
  });
}

// ─── Render: Featured cards ────────────────────────────────────────────────

function renderFeatured() {
  document.getElementById("featured-grid").innerHTML = FEATURED.map(f => `
    <div class="navy-bg text-white p-8 flex flex-col justify-between relative overflow-hidden rounded-lg min-h-[480px]">
      <div class="z-10">
        <span class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-70 mb-4 block font-display">${f.label}</span>
        <h3 class="text-4xl font-bold mb-4 leading-tight tracking-tight text-white font-display">${f.name}</h3>
        <p class="text-slate-300 text-sm font-normal leading-relaxed mb-8 font-display">${f.desc}</p>
        <div class="flex gap-8 mb-8">
          <div>
            <p class="text-[10px] uppercase tracking-widest opacity-60 mb-1 font-display">Target APY</p>
            <p class="text-4xl font-bold font-display">${f.apy}</p>
          </div>
        </div>
      </div>
      <div class="z-10">
        <button onclick="window.location.href='${f.link}'" class="bg-white text-navy-accent w-full py-3 font-bold uppercase tracking-widest text-xs hover:bg-slate-100 transition-colors font-display">
          Invest Now
        </button>
      </div>
      <div class="absolute right-[-20%] bottom-[-10%] opacity-10 pointer-events-none">
        <span class="material-symbols-outlined text-[200px]">${f.icon}</span>
      </div>
    </div>
  `).join("");
}

// ─── Render: Vault row ─────────────────────────────────────────────────────

function renderVaultRow(v) {
  return `
    <div class="grid grid-cols-12 items-center gap-4 px-6 py-8 hover:bg-slate-50 transition-colors cursor-pointer group"
         onclick="window.location.href='${v.link}'">
      <div class="col-span-1">
        <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-border-light">
          ${v.icon}
        </div>
      </div>
      <div class="col-span-4">
        <p class="text-lg font-bold text-text-main group-hover:underline font-display">${v.name}</p>
        <p class="text-xs text-slate-500 font-normal font-display">Curated by ${v.curator}</p>
      </div>
      <div class="col-span-2 text-right">
        <p class="text-lg font-bold text-navy-accent font-display">${v.apy.toFixed(2)}%</p>
      </div>
      <div class="col-span-2 text-right">
        <p class="text-sm text-slate-600 font-normal font-display">${v.tvlDisplay}</p>
      </div>
      <div class="col-span-2 flex justify-center">
        <div class="w-8 h-8 rounded-full border border-border-light flex items-center justify-center text-[10px] font-bold text-slate-500 font-display">
          ${v.risk}
        </div>
      </div>
      <div class="col-span-1 text-right">
        <span class="material-symbols-outlined text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
      </div>
    </div>
  `;
}

// ─── Render: Vault list + pagination ──────────────────────────────────────

function renderVaults() {
  const filters  = getFilters();
  const filtered = applyFilters(VAULTS, filters);
  const total    = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

  currentPage = Math.min(currentPage, totalPages);

  const slice = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  document.getElementById("vault-list").innerHTML = slice.length
    ? slice.map(renderVaultRow).join("")
    : '<div class="px-6 py-16 text-center text-slate-400 text-sm font-display">No vaults match the selected filters.</div>';

  document.getElementById("vault-count").textContent =
    `${total} vault${total !== 1 ? "s" : ""} found`;

  renderPagination(totalPages);
}

// ─── Render: Pagination ────────────────────────────────────────────────────

function renderPagination(totalPages) {
  const el = document.getElementById("pagination");

  if (totalPages <= 1) {
    el.innerHTML = "";
    return;
  }

  // Build visible page numbers: always show first, last, current ± 1, with ellipsis
  const pages = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1]
    .filter(p => p >= 1 && p <= totalPages));
  const sorted = [...pages].sort((a, b) => a - b);

  let pageHtml = "";
  let prev = null;
  for (const p of sorted) {
    if (prev !== null && p - prev > 1) {
      pageHtml += `<span class="text-slate-300 px-0.5 text-sm">···</span>`;
    }
    const active = p === currentPage;
    pageHtml += `
      <button onclick="goToPage(${p})"
        class="w-7 h-7 rounded-full ${active
          ? "bg-primary text-white"
          : "border border-border-light text-slate-500 hover:bg-slate-50"
        } text-[10px] font-bold flex items-center justify-center transition-colors font-display">
        ${p}
      </button>`;
    prev = p;
  }

  const prevDisabled = currentPage === 1;
  const nextDisabled = currentPage === totalPages;

  el.innerHTML = `
    <button onclick="goToPage(${currentPage - 1})" ${prevDisabled ? "disabled" : ""}
      class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest transition-colors font-display
             ${prevDisabled ? "text-slate-300 cursor-not-allowed" : "text-primary hover:text-slate-700"}">
      <span class="material-symbols-outlined text-sm">chevron_left</span> Previous
    </button>
    <div class="flex items-center gap-1.5">${pageHtml}</div>
    <button onclick="goToPage(${currentPage + 1})" ${nextDisabled ? "disabled" : ""}
      class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest transition-colors font-display
             ${nextDisabled ? "text-slate-300 cursor-not-allowed" : "text-primary hover:text-slate-700"}">
      Next <span class="material-symbols-outlined text-sm">chevron_right</span>
    </button>
  `;
}

function goToPage(page) {
  const filtered = applyFilters(VAULTS, getFilters());
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderVaults();
  document.querySelector("main").scrollIntoView({ behavior: "smooth" });
}

// ─── Init ──────────────────────────────────────────────────────────────────

renderFeatured();
renderVaults();

["filter-asset", "filter-apy", "filter-tvl", "filter-risk"].forEach(id => {
  document.getElementById(id).addEventListener("change", () => {
    currentPage = 1;
    renderVaults();
  });
});

document.getElementById("reset-filters").addEventListener("click", () => {
  ["filter-asset", "filter-apy", "filter-tvl", "filter-risk"].forEach(id => {
    document.getElementById(id).selectedIndex = 0;
  });
  currentPage = 1;
  renderVaults();
});
</script>
