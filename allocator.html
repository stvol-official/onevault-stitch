<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minimalist Smart Yield Terminal v2</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1B2A4A",
              "background-light": "#FFFFFF",
              "background-dark": "#0D0D0D",
              "card-light": "#FFFFFF",
              "card-dark": "#121212",
              "border-light": "#E5E5E5",
              "border-dark": "#262626",
              "accent-green": "#22C55E",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              sans: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "4px",
              'lg': "8px",
            },
          },
        },
      };
    </script>
<style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        vertical-align: middle;
      }.custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #E5E5E5;
        border-radius: 10px;
      }
    </style>
</head>

</div>
</div>

<button class="absolute right-3 top-1/2 -translate-y-1/2 text-[11px] font-bold uppercase tracking-widest text-primary dark:text-white border border-border-light dark:border-border-dark px-3 py-1.5 rounded hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">

<div class="w-2 h-2 rounded-full bg-blue-600"></div>

</div>
</div>
<button class="w-full bg-primary dark:bg-white text-white dark:text-black py-4 font-bold uppercase tracking-[0.2em] text-sm hover:opacity-90 transition-opacity active:scale-[0.98]">

<div class="mt-10 flex flex-col items-center gap-3">

<span class="material-symbols-outlined hidden dark:block">light_mode</span>
</button>
